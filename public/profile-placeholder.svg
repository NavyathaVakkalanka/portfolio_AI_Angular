<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <circle cx="150" cy="150" r="150" fill="#162952"/>
  
  <!-- Gold ring accent -->
  <circle cx="150" cy="150" r="145" fill="none" stroke="#C9A84C" stroke-width="2" stroke-opacity="0.4"/>
  
  <!-- Subtle pattern overlay -->
  <circle cx="150" cy="150" r="100" fill="rgba(201,168,76,0.05)"/>

  <!-- Body/torso shape -->
  <ellipse cx="150" cy="240" rx="80" ry="50" fill="#0D1B3E"/>
  <ellipse cx="150" cy="210" rx="65" ry="55" fill="#1a2d5a"/>
  
  <!-- Neck -->
  <rect x="132" y="155" width="36" height="35" rx="10" fill="#C9A84C" fill-opacity="0.7"/>
  
  <!-- Head -->
  <circle cx="150" cy="130" r="52" fill="#C9A84C" fill-opacity="0.75"/>
  <circle cx="150" cy="128" r="48" fill="#d4b06a"/>
  
  <!-- Face subtle features -->
  <ellipse cx="136" cy="124" rx="7" ry="8" fill="#0D1B3E" fill-opacity="0.5"/>
  <ellipse cx="164" cy="124" rx="7" ry="8" fill="#0D1B3E" fill-opacity="0.5"/>
  <path d="M138 148 Q150 158 162 148" stroke="#0D1B3E" stroke-width="2.5" stroke-opacity="0.4" fill="none" stroke-linecap="round"/>
  
  <!-- Hair -->
  <path d="M98 115 Q100 70 150 68 Q200 70 202 115 Q190 95 170 90 Q150 86 130 90 Q110 96 98 115Z" fill="#3d2200" fill-opacity="0.8"/>

  <!-- Collar / suit top -->
  <path d="M90 200 Q110 175 130 180 L150 195 L170 180 Q190 175 210 200 Q185 210 150 215 Q115 210 90 200Z" fill="#0D1B3E"/>
  <path d="M130 180 L150 210 L170 180" fill="none" stroke="#C9A84C" stroke-width="2" stroke-opacity="0.6"/>

  <!-- NV monogram at bottom -->
  <text x="150" y="285" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#C9A84C" fill-opacity="0.6" text-anchor="middle" letter-spacing="4">NV</text>
</svg>
